# Revyl CLI Configuration
# Generated by: revyl init
# Edit these settings or run: revyl config set <key> <value>
# Docs: https://docs.revyl.ai/cli/hot-reload

project:
    name: crowly
build:
    system: Xcode
    command: xcodebuild -project Crowly.xcodeproj -scheme * -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' -derivedDataPath build
    output: build/Build/Products/Debug-iphonesimulator/*.app
    platforms:
        ios:
            command: xcodebuild -project Crowly.xcodeproj -scheme 'Crowly' -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' -derivedDataPath build
            output: build/Build/Products/Debug-iphonesimulator/*.app
            scheme: Crowly
defaults:
    open_browser: true
    timeout: 1800
