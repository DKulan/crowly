# Crowly push relay — project-operated, central. Deployed by the Crowly team,
# NOT by self-hosting users (companion/docker-compose.yml is the user side).
#
# Why a separate compose: the relay is a different ownership/operational
# concern from the companion. A user's `docker compose up` brings up their
# companion + Caddy on their VPS; the relay runs on a project-owned host with
# the APNs .p8 mounted in. Same wire shape (HTTP, JSON, bearer auth on /push),
# different operator.
#
# Topology:
#
#   companion (per user, on user's VPS)
#         │  POST /push  (RELAY_PUSH_TOKEN bearer)
#         ▼
#   Caddy :443 (auto-HTTPS, optional)  ──▶  relay :8788
#                                              │
#                                              └─▶ APNs (api[.sandbox].push.apple.com)
#                                              └─▶ /opt/data (SQLite: routing_token → device_token)
#
# For M1 you can run this on a single small VPS — the relay does very little
# CPU, holds maybe a few hundred rows, and is best-effort so a brief outage
# never breaks the product. TLS termination is your choice; sample Caddyfile
# is below in `caddy/` if you want auto-HTTPS, otherwise terminate however
# you usually do.
#
# Operator workflow:
#   1. Get a paid Apple Developer account + create an APNs Auth Key (.p8).
#      Copy the .p8 file onto the relay host, e.g. /opt/data/AuthKey_XXXX.p8.
#   2. cp .env.example .env and fill in RELAY_PUSH_TOKEN, APNS_* values.
#   3. docker compose up -d
#   4. Each companion gets `RELAY_URL` + `RELAY_PUSH_TOKEN` (the same shared
#      bearer) baked into its env vars; companions then call /push.
#
# Switching mock → real:
#   * APNS_ENV=mock  — boot in dev mode, MockAPNsClient records pushes but
#                      doesn't actually call Apple. The /push chain still
#                      works end-to-end; useful for local testing.
#   * APNS_ENV=sandbox    — talks to api.sandbox.push.apple.com. Use this
#                           against TestFlight or a dev-provisioned device.
#   * APNS_ENV=production — talks to api.push.apple.com. Production.

services:
  relay:
    build:
      context: ..
      dockerfile: relay/Dockerfile
    image: crowly-relay:latest
    container_name: crowly-relay
    restart: unless-stopped
    # Expose 8788 to the host so a fronting Caddy/Cloudflare/etc. can reach
    # it. If you don't run a separate TLS terminator, you can publish 8788
    # directly (e.g. behind a private firewall) but companions calling /push
    # over plain HTTP across the public internet leaks the bearer token in
    # transit — don't do that. Terminate TLS somewhere.
    ports:
      - "8788:8788"
    environment:
      # The bearer companions present on /push. Required.
      RELAY_PUSH_TOKEN: ${RELAY_PUSH_TOKEN:?RELAY_PUSH_TOKEN must be set in .env}
      RELAY_DB_PATH: /opt/data/relay.db
      RELAY_HOST: 0.0.0.0
      RELAY_PORT: 8788
      RELAY_RATE_LIMIT_PER_MINUTE: ${RELAY_RATE_LIMIT_PER_MINUTE:-30}
      # APNs config. APNS_ENV controls everything — default is `mock` so the
      # container boots cleanly with no Apple creds wired in. The operator
      # opts into real APNs by setting APNS_ENV + the four APNs vars below.
      APNS_ENV: ${APNS_ENV:-mock}
      APNS_TOPIC: ${APNS_TOPIC:-dev.mock.crowly}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
    volumes:
      # Persistent data: the routing_token → device_token table. Small but
      # critical — losing it means every device has to re-register.
      - relay-data:/opt/data
      # The .p8 lives on the host (NOT in the image, NOT in this repo). Mount
      # the directory holding it read-only; APNS_KEY_PATH in .env points at
      # the file inside that mount.
      - ${APNS_KEY_HOST_DIR:-./apns-keys}:/etc/apns:ro

volumes:
  relay-data:
