# Crowly — XcodeGen project spec.
# Regenerate the .xcodeproj after editing:  xcodegen generate
# M1 target: iOS 26 (single-user, Daniel's own device) → Liquid Glass APIs allowed.
name: Crowly
options:
  bundleIdPrefix: com.crowly
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "4"
    # Device build (TestFlight): automatic signing with the personal Apple
    # Developer team. Set here in project.yml — NOT in Xcode's GUI — because
    # `xcodegen generate` regenerates the .xcodeproj and would wipe GUI-only
    # signing settings. Xcode resolves the actual provisioning profile from
    # this team + the bundle ids automatically.
    DEVELOPMENT_TEAM: "54BYZM6677"
    CODE_SIGN_STYLE: Automatic
    # Simulator-only builds still work (signing is skipped for the simulator
    # destination); this just additionally enables real signing for a device /
    # archive build. To go back to the pure simulator-unsigned baseline, set
    # CODE_SIGNING_ALLOWED: "NO".

targets:
  Crowly:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crowly.Crowly
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: "YES"
        ENABLE_PREVIEWS: "YES"
        # iPhone-only (TARGETED_DEVICE_FAMILY=1). Crowly is a portrait phone
        # reader; supporting iPad would require the full multitasking
        # orientation set + an iPad icon. Restricting to iPhone drops both
        # App Store validation errors (152x152 iPad icon, iPad multitasking
        # orientations) — they only fired because the default is universal.
        TARGETED_DEVICE_FAMILY: "1"
    # The app Info.plist is generated by xcodegen from this `info` block.
    # We define it explicitly (rather than `GENERATE_INFOPLIST_FILE: YES`)
    # so we can register the `crowly://` URL scheme — the widget deeplink
    # target. Bug #2 fix from review pass B.
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Crowly
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.crowly.Crowly
            CFBundleURLSchemes: [crowly]
    # Phase 1 (live widget): the app and the widget extension must share the
    # pairing token (Keychain) and a read-state snapshot (App Group).
    #   - keychain-access-groups: the FIRST entry is the default access group
    #     for both targets, so KeychainStore never has to pass an explicit
    #     kSecAttrAccessGroup (which would need the team-id prefix and trips
    #     errSecMissingEntitlement on the simulator). Both targets share the
    #     same fixed Keychain *service* (SharedKeychain.service) so item
    #     identity matches across the app<->widget boundary.
    #   - application-groups: backs the widget's offline snapshot fallback
    #     (WidgetSnapshotStore, UserDefaults suite `group.com.crowly`).
    # XcodeGen writes this plist from `properties` on every `generate`.
    entitlements:
      path: App/Crowly.entitlements
      properties:
        # `com.crowly.shared` MUST stay the FIRST keychain-access-group entry:
        # KeychainStore sets no explicit kSecAttrAccessGroup, so SecItem uses
        # the first entry as the default group. Adding another group ABOVE it
        # (e.g. a future share extension) would silently move the app's writes
        # to the wrong group and the widget would stop finding the token.
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.crowly.shared
        com.apple.security.application-groups:
          - group.com.crowly
    dependencies:
      - target: CrowlyWidgetExtension

  CrowlyWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crowly.Crowly.Widget
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: Widget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Crowly
        ENABLE_PREVIEWS: "YES"
    # Same shared-access entitlements as the app target (see the app's
    # `entitlements` note). Both targets MUST list identical values or the
    # default keychain access group and App Group won't line up.
    entitlements:
      path: Widget/CrowlyWidget.entitlements
      properties:
        # See the app target's note: `com.crowly.shared` must stay FIRST.
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.crowly.shared
        com.apple.security.application-groups:
          - group.com.crowly

  CrowlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Crowly
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Crowly:
    build:
      targets:
        Crowly: all
        CrowlyWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - CrowlyTests
