# Crowly — XcodeGen project spec.
# Regenerate the .xcodeproj after editing:  xcodegen generate
# M1 target: iOS 26 (single-user, Daniel's own device) → Liquid Glass APIs allowed.
name: Crowly
options:
  bundleIdPrefix: com.crowly
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    # Simulator-only baseline: build without signing. When the shared App Group
    # container is first exercised (widget reads app-written data), switch to
    # ad-hoc signing (CODE_SIGN_IDENTITY: "-") and wire the .entitlements files
    # that already live in App/ and Widget/.
    CODE_SIGNING_ALLOWED: "NO"

targets:
  Crowly:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crowly.Crowly
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: "YES"
        ENABLE_PREVIEWS: "YES"
    # The app Info.plist is generated by xcodegen from this `info` block.
    # We define it explicitly (rather than `GENERATE_INFOPLIST_FILE: YES`)
    # so we can register the `crowly://` URL scheme — the widget deeplink
    # target. Bug #2 fix from review pass B.
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Crowly
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.crowly.Crowly
            CFBundleURLSchemes: [crowly]
        # Central push relay base URL. EMPTY by default: demo / App-Review
        # builds (and dev builds with no relay yet) never reach out to a relay,
        # so the app never prompts for notifications until a real relay URL is
        # set here AND the user has paired a companion. Fill this in for a push-
        # enabled build (e.g. https://relay.crowly.app). See App/Net/RelayClient.
        CrowlyRelayURL: ""
        # Real APNs delivery additionally requires the `aps-environment`
        # entitlement (development/production) and a paid Apple Developer
        # account — wired via App/Crowly.entitlements when push goes live on a
        # device. Simulator-unsigned M1 builds register-and-no-op (the sim has
        # no real APNs token). See relay/README.md for the on-device runbook.
    dependencies:
      - target: CrowlyWidgetExtension

  CrowlyWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crowly.Crowly.Widget
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: Widget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Crowly
        ENABLE_PREVIEWS: "YES"

  CrowlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Crowly
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Crowly:
    build:
      targets:
        Crowly: all
        CrowlyWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - CrowlyTests
